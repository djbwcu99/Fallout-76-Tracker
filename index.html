<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout 76 Rare Items Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: #000000 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23000" width="100" height="100"/><rect fill="%23001a00" x="0" y="0" width="50" height="50"/><rect fill="%23001a00" x="50" y="50" width="50" height="50"/></svg>');
            color: #00ff41;
            min-height: 100vh;
            padding: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            border: 3px solid #00ff41;
            background: rgba(0, 20, 0, 0.95);
            padding: 30px;
            box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.15), 0 0 30px rgba(0, 255, 65, 0.25);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: linear-gradient(0deg, transparent 24%, rgba(0, 255, 65, 0.08) 25%, rgba(0, 255, 65, 0.08) 26%, transparent 27%, transparent 74%, rgba(0, 255, 65, 0.08) 75%, rgba(0, 255, 65, 0.08) 76%, transparent 77%, transparent);
            background-size: 100% 4px;
        }

        h1 {
            text-align: center;
            color: #00ff41;
            margin-bottom: 5px;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        }

        .subtitle {
            text-align: center;
            color: #00aa20;
            margin-bottom: 30px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .sections {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: rgba(0, 40, 0, 0.7);
            border: 2px solid #00ff41;
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.12);
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: linear-gradient(0deg, transparent 24%, rgba(0, 255, 65, 0.03) 25%, rgba(0, 255, 65, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 65, 0.03) 75%, rgba(0, 255, 65, 0.03) 76%, transparent 77%, transparent);
            background-size: 100% 2px;
        }

        .section h2 {
            color: #00ff41;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
        }

        .subsection {
            margin-bottom: 20px;
        }

        .subsection h3 {
            color: #00dd33;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 5px;
            border-bottom: 1px solid #00aa20;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 50, 0, 0.8);
            border-left: 3px solid #00ff41;
            transition: all 0.2s;
            position: relative;
        }

        .item:hover {
            background: rgba(0, 80, 0, 0.9);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00ff41;
        }

        .item label {
            flex: 1;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
        }

        .item input[type="checkbox"]:checked + label {
            color: #00aa20;
            text-decoration: line-through;
        }

        .delete-btn {
            background: #aa0000;
            border: 1px solid #ff4444;
            color: #ffcccc;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
        }

        .delete-btn:hover {
            background: #ff4444;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.6);
        }

        .add-item {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .add-item input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(0, 30, 0, 0.9);
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }

        .add-item input::placeholder {
            color: #006600;
        }

        .add-item input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        .add-item button {
            padding: 8px 14px;
            background: #00aa20;
            border: 2px solid #00ff41;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .add-item button:hover {
            background: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.6);
        }

        .stats {
            background: rgba(0, 40, 0, 0.7);
            border: 2px solid #00ff41;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.12);
        }

        .stats::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: linear-gradient(0deg, transparent 24%, rgba(0, 255, 65, 0.03) 25%, rgba(0, 255, 65, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 65, 0.03) 75%, rgba(0, 255, 65, 0.03) 76%, transparent 77%, transparent);
            background-size: 100% 2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .stat-box {
            background: rgba(0, 60, 0, 0.8);
            padding: 15px;
            border: 2px solid #00ff41;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 900;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }

        .stat-label {
            font-size: 10px;
            color: #00aa20;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .reset-btn {
            padding: 10px 20px;
            background: #aa0000;
            border: 2px solid #ff4444;
            color: #ffcccc;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
            position: relative;
            z-index: 1;
        }

        .reset-btn:hover {
            background: #ff4444;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .export-btn {
            padding: 10px 20px;
            background: #00aa20;
            border: 2px solid #00ff41;
            color: #000;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .export-btn:hover {
            background: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
        }

        .modal-content {
            background: rgba(0, 30, 0, 0.98);
            margin: 15% auto;
            padding: 30px;
            border: 3px solid #00ff41;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .modal-content h2 {
            color: #00ff41;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-buttons button {
            padding: 12px 20px;
            background: #00aa20;
            border: 2px solid #00ff41;
            color: #000;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .modal-buttons button:hover {
            background: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.6);
        }

        .modal-buttons .cancel-btn {
            background: #aa0000;
            border-color: #ff4444;
            color: #ffcccc;
        }

        .modal-buttons .cancel-btn:hover {
            background: #ff4444;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-controls">
            <h1>⚛️ Fallout 76 Rare Items Tracker</h1>
            <button class="export-btn" onclick="openExportModal()">📊 Export</button>
        </div>
        <p class="subtitle">Track your equipment and titles earned</p>

        <!-- Export Modal -->
        <div id="exportModal" class="modal">
            <div class="modal-content">
                <h2>Export Data</h2>
                <div class="modal-buttons">
                    <button onclick="exportToExcel()">📈 Export to Excel</button>
                    <button onclick="exportToCSV()">📄 Export to CSV</button>
                    <button class="cancel-btn" onclick="closeExportModal()">Cancel</button>
                </div>
            </div>
        </div>

        <div class="sections">
            <!-- Equipment Section -->
            <div class="section">
                <h2>Equipment</h2>
                <div class="item-list" id="equipmentList"></div>
                <div class="add-item">
                    <input type="text" id="equipmentInput" placeholder="Add new equipment...">
                    <button onclick="addEquipment()">Add</button>
                </div>
            </div>

            <!-- Titles Section -->
            <div class="section">
                <h2>Titles</h2>

                <div class="subsection">
                    <h3>Player Titles</h3>
                    <div class="item-list" id="playerTitlesList"></div>
                    <div class="add-item">
                        <input type="text" id="playerTitlesInput" placeholder="Add player title...">
                        <button onclick="addPlayerTitle()">Add</button>
                    </div>
                </div>

                <div class="subsection">
                    <h3>Camp Titles</h3>
                    <div class="item-list" id="campTitlesList"></div>
                    <div class="add-item">
                        <input type="text" id="campTitlesInput" placeholder="Add camp title...">
                        <button onclick="addCampTitle()">Add</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mods Section -->
        <div class="section" style="margin-bottom: 30px;">
            <h2>Mods Acquired</h2>

            <div class="subsection">
                <h3>1-Star Mods</h3>
                <div class="item-list" id="mods1StarList"></div>
                <div class="add-item">
                    <input type="text" id="mods1StarInput" placeholder="Add 1-star mod...">
                    <button onclick="addMod1Star()">Add</button>
                </div>
            </div>

            <div class="subsection">
                <h3>2-Star Mods</h3>
                <div class="item-list" id="mods2StarList"></div>
                <div class="add-item">
                    <input type="text" id="mods2StarInput" placeholder="Add 2-star mod...">
                    <button onclick="addMod2Star()">Add</button>
                </div>
            </div>

            <div class="subsection">
                <h3>3-Star Mods</h3>
                <div class="item-list" id="mods3StarList"></div>
                <div class="add-item">
                    <input type="text" id="mods3StarInput" placeholder="Add 3-star mod...">
                    <button onclick="addMod3Star()">Add</button>
                </div>
            </div>

            <div class="subsection">
                <h3>4-Star Mods</h3>
                <div class="item-list" id="mods4StarList"></div>
                <div class="add-item">
                    <input type="text" id="mods4StarInput" placeholder="Add 4-star mod...">
                    <button onclick="addMod4Star()">Add</button>
                </div>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number" id="equipmentEarned">0</div>
                    <div class="stat-label">Equipment Earned</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="titlesEarned">0</div>
                    <div class="stat-label">Titles Earned</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="modsEarned">0</div>
                    <div class="stat-label">Mods Earned</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalEarned">0</div>
                    <div class="stat-label">Total Earned</div>
                </div>
            </div>
            <button class="reset-btn" onclick="resetAll()">Reset All Data</button>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            equipment: 'fo76_equipment',
            playerTitles: 'fo76_playerTitles',
            campTitles: 'fo76_campTitles',
            mods1Star: 'fo76_mods1Star',
            mods2Star: 'fo76_mods2Star',
            mods3Star: 'fo76_mods3Star',
            mods4Star: 'fo76_mods4Star'
        };

        // Initialize with default items
        function initializeDefaults() {
            if (!localStorage.getItem(STORAGE_KEYS.equipment)) {
                const defaultEquipment = ['Power Armor Set', 'Rare Weapons', 'Rare Apparel'];
                localStorage.setItem(STORAGE_KEYS.equipment, JSON.stringify(defaultEquipment.map(item => ({ name: item, earned: false }))));
            }
            if (!localStorage.getItem(STORAGE_KEYS.playerTitles)) {
                const defaultTitles = ['Enclave Commander', 'Raider Queen', 'Brotherhood Elder'];
                localStorage.setItem(STORAGE_KEYS.playerTitles, JSON.stringify(defaultTitles.map(item => ({ name: item, earned: false }))));
            }
            if (!localStorage.getItem(STORAGE_KEYS.campTitles)) {
                const defaultTitles = ['Magnificent Camp', 'Fortress Base', 'Themed Paradise'];
                localStorage.setItem(STORAGE_KEYS.campTitles, JSON.stringify(defaultTitles.map(item => ({ name: item, earned: false }))));
            }
            if (!localStorage.getItem(STORAGE_KEYS.mods1Star)) {
                localStorage.setItem(STORAGE_KEYS.mods1Star, JSON.stringify([]));
            }
            if (!localStorage.getItem(STORAGE_KEYS.mods2Star)) {
                localStorage.setItem(STORAGE_KEYS.mods2Star, JSON.stringify([]));
            }
            if (!localStorage.getItem(STORAGE_KEYS.mods3Star)) {
                localStorage.setItem(STORAGE_KEYS.mods3Star, JSON.stringify([]));
            }
            if (!localStorage.getItem(STORAGE_KEYS.mods4Star)) {
                localStorage.setItem(STORAGE_KEYS.mods4Star, JSON.stringify([]));
            }
        }

        function getItems(key) {
            const items = localStorage.getItem(key);
            return items ? JSON.parse(items) : [];
        }

        function saveItems(key, items) {
            localStorage.setItem(key, JSON.stringify(items));
            render();
        }

        function renderList(containerId, key) {
            const items = getItems(key);
            const container = document.getElementById(containerId);
            container.innerHTML = items.map((item, index) => `
                <div class="item">
                    <input type="checkbox" ${item.earned ? 'checked' : ''}
                           onchange="toggleItem('${key}', ${index})">
                    <label>${item.name}</label>
                    <button class="delete-btn" onclick="deleteItem('${key}', ${index})">×</button>
                </div>
            `).join('');
        }

        function toggleItem(key, index) {
            const items = getItems(key);
            items[index].earned = !items[index].earned;
            saveItems(key, items);
        }

        function deleteItem(key, index) {
            const items = getItems(key);
            items.splice(index, 1);
            saveItems(key, items);
        }

        function addEquipment() {
            addItem(STORAGE_KEYS.equipment, 'equipmentInput');
        }

        function addPlayerTitle() {
            addItem(STORAGE_KEYS.playerTitles, 'playerTitlesInput');
        }

        function addCampTitle() {
            addItem(STORAGE_KEYS.campTitles, 'campTitlesInput');
        }

        function addMod1Star() {
            addItem(STORAGE_KEYS.mods1Star, 'mods1StarInput');
        }

        function addMod2Star() {
            addItem(STORAGE_KEYS.mods2Star, 'mods2StarInput');
        }

        function addMod3Star() {
            addItem(STORAGE_KEYS.mods3Star, 'mods3StarInput');
        }

        function addMod4Star() {
            addItem(STORAGE_KEYS.mods4Star, 'mods4StarInput');
        }

        function addItem(key, inputId) {
            const input = document.getElementById(inputId);
            const name = input.value.trim();
            if (name) {
                const items = getItems(key);
                items.push({ name, earned: false });
                saveItems(key, items);
                input.value = '';
            }
        }

        function updateStats() {
            const equipment = getItems(STORAGE_KEYS.equipment);
            const playerTitles = getItems(STORAGE_KEYS.playerTitles);
            const campTitles = getItems(STORAGE_KEYS.campTitles);
            const mods1Star = getItems(STORAGE_KEYS.mods1Star);
            const mods2Star = getItems(STORAGE_KEYS.mods2Star);
            const mods3Star = getItems(STORAGE_KEYS.mods3Star);
            const mods4Star = getItems(STORAGE_KEYS.mods4Star);

            const equipmentEarned = equipment.filter(i => i.earned).length;
            const titlesEarned = [...playerTitles, ...campTitles].filter(i => i.earned).length;
            const modsEarned = [...mods1Star, ...mods2Star, ...mods3Star, ...mods4Star].filter(i => i.earned).length;
            const totalEarned = equipmentEarned + titlesEarned + modsEarned;

            document.getElementById('equipmentEarned').textContent = equipmentEarned;
            document.getElementById('titlesEarned').textContent = titlesEarned;
            document.getElementById('modsEarned').textContent = modsEarned;
            document.getElementById('totalEarned').textContent = totalEarned;
        }

        function render() {
            renderList('equipmentList', STORAGE_KEYS.equipment);
            renderList('playerTitlesList', STORAGE_KEYS.playerTitles);
            renderList('campTitlesList', STORAGE_KEYS.campTitles);
            renderList('mods1StarList', STORAGE_KEYS.mods1Star);
            renderList('mods2StarList', STORAGE_KEYS.mods2Star);
            renderList('mods3StarList', STORAGE_KEYS.mods3Star);
            renderList('mods4StarList', STORAGE_KEYS.mods4Star);
            updateStats();
        }

        function resetAll() {
            if (confirm('Reset all data? This cannot be undone.')) {
                localStorage.clear();
                initializeDefaults();
                render();
            }
        }

        function openExportModal() {
            document.getElementById('exportModal').style.display = 'block';
        }

        function closeExportModal() {
            document.getElementById('exportModal').style.display = 'none';
        }

        function exportToExcel() {
            const equipment = getItems(STORAGE_KEYS.equipment);
            const playerTitles = getItems(STORAGE_KEYS.playerTitles);
            const campTitles = getItems(STORAGE_KEYS.campTitles);
            const mods1Star = getItems(STORAGE_KEYS.mods1Star);
            const mods2Star = getItems(STORAGE_KEYS.mods2Star);
            const mods3Star = getItems(STORAGE_KEYS.mods3Star);
            const mods4Star = getItems(STORAGE_KEYS.mods4Star);

            const wb = XLSX.utils.book_new();

            // Equipment sheet
            const equipmentData = [['Item', 'Earned']].concat(equipment.map(e => [e.name, e.earned ? 'Yes' : 'No']));
            const equipmentSheet = XLSX.utils.aoa_to_sheet(equipmentData);
            XLSX.utils.book_append_sheet(wb, equipmentSheet, 'Equipment');

            // Titles sheet
            const titlesData = [['Item', 'Type', 'Earned']].concat(
                playerTitles.map(t => [t.name, 'Player', t.earned ? 'Yes' : 'No']).concat(
                    campTitles.map(t => [t.name, 'Camp', t.earned ? 'Yes' : 'No'])
                )
            );
            const titlesSheet = XLSX.utils.aoa_to_sheet(titlesData);
            XLSX.utils.book_append_sheet(wb, titlesSheet, 'Titles');

            // Mods sheet
            const modsData = [['Item', 'Rarity', 'Earned']].concat(
                mods1Star.map(m => [m.name, '1-Star', m.earned ? 'Yes' : 'No']).concat(
                    mods2Star.map(m => [m.name, '2-Star', m.earned ? 'Yes' : 'No']).concat(
                        mods3Star.map(m => [m.name, '3-Star', m.earned ? 'Yes' : 'No']).concat(
                            mods4Star.map(m => [m.name, '4-Star', m.earned ? 'Yes' : 'No'])
                        )
                    )
                )
            );
            const modsSheet = XLSX.utils.aoa_to_sheet(modsData);
            XLSX.utils.book_append_sheet(wb, modsSheet, 'Mods');

            // Summary sheet
            const equipmentEarned = equipment.filter(i => i.earned).length;
            const titlesEarned = [...playerTitles, ...campTitles].filter(i => i.earned).length;
            const modsEarned = [...mods1Star, ...mods2Star, ...mods3Star, ...mods4Star].filter(i => i.earned).length;
            const totalEarned = equipmentEarned + titlesEarned + modsEarned;

            const summaryData = [
                ['Category', 'Earned', 'Total', 'Percentage'],
                ['Equipment', equipmentEarned, equipment.length, equipment.length > 0 ? ((equipmentEarned / equipment.length) * 100).toFixed(1) + '%' : '0%'],
                ['Titles', titlesEarned, playerTitles.length + campTitles.length, (playerTitles.length + campTitles.length) > 0 ? ((titlesEarned / (playerTitles.length + campTitles.length)) * 100).toFixed(1) + '%' : '0%'],
                ['Mods', modsEarned, mods1Star.length + mods2Star.length + mods3Star.length + mods4Star.length, (mods1Star.length + mods2Star.length + mods3Star.length + mods4Star.length) > 0 ? ((modsEarned / (mods1Star.length + mods2Star.length + mods3Star.length + mods4Star.length)) * 100).toFixed(1) + '%' : '0%'],
                ['TOTAL', totalEarned, equipment.length + playerTitles.length + campTitles.length + mods1Star.length + mods2Star.length + mods3Star.length + mods4Star.length, '']
            ];
            const summarySheet = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');

            XLSX.writeFile(wb, 'Fallout76_Tracker_' + new Date().toISOString().slice(0, 10) + '.xlsx');
            closeExportModal();
        }

        function exportToCSV() {
            const equipment = getItems(STORAGE_KEYS.equipment);
            const playerTitles = getItems(STORAGE_KEYS.playerTitles);
            const campTitles = getItems(STORAGE_KEYS.campTitles);
            const mods1Star = getItems(STORAGE_KEYS.mods1Star);
            const mods2Star = getItems(STORAGE_KEYS.mods2Star);
            const mods3Star = getItems(STORAGE_KEYS.mods3Star);
            const mods4Star = getItems(STORAGE_KEYS.mods4Star);

            let csv = 'Fallout 76 Rare Items Tracker Export\n\n';

            csv += 'EQUIPMENT\n';
            csv += 'Item,Earned\n';
            equipment.forEach(e => {
                csv += `"${e.name}","${e.earned ? 'Yes' : 'No'}"\n`;
            });

            csv += '\n\nTITLES\n';
            csv += 'Item,Type,Earned\n';
            playerTitles.forEach(t => {
                csv += `"${t.name}","Player","${t.earned ? 'Yes' : 'No'}"\n`;
            });
            campTitles.forEach(t => {
                csv += `"${t.name}","Camp","${t.earned ? 'Yes' : 'No'}"\n`;
            });

            csv += '\n\nMODS\n';
            csv += 'Item,Rarity,Earned\n';
            mods1Star.forEach(m => {
                csv += `"${m.name}","1-Star","${m.earned ? 'Yes' : 'No'}"\n`;
            });
            mods2Star.forEach(m => {
                csv += `"${m.name}","2-Star","${m.earned ? 'Yes' : 'No'}"\n`;
            });
            mods3Star.forEach(m => {
                csv += `"${m.name}","3-Star","${m.earned ? 'Yes' : 'No'}"\n`;
            });
            mods4Star.forEach(m => {
                csv += `"${m.name}","4-Star","${m.earned ? 'Yes' : 'No'}"\n`;
            });

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv));
            element.setAttribute('download', 'Fallout76_Tracker_' + new Date().toISOString().slice(0, 10) + '.csv');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            closeExportModal();
        }

        // Close modal if clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('exportModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Initialize on load
        initializeDefaults();
        render();
    </script>
</body>
</html>
